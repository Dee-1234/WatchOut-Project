<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebSocket Pomodoro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; background-color: #f0f2f5; }
        .timer-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        #timer-display { font-size: 80px; font-weight: bold; margin: 20px 0; color: #d9534f; }
        #phase-label { font-size: 24px; color: #555; text-transform: uppercase; }
        .btn-group button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        .work-btn { background: #d9534f; color: white; }
        .short-btn { background: #5bc0de; color: white; }
        .long-btn { background: #5cb85c; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="timer-container">
    <div id="phase-label">Ready to start?</div>
    <div id="timer-display">00:00</div>

    <div class="btn-group">
        <button class="work-btn" onclick="sendSignal('work')">Start Work</button>
        <button class="short-btn" onclick="sendSignal('short-break')">Short Break</button>
        <button class="long-btn" onclick="sendSignal('long-break')">Long Break</button>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
